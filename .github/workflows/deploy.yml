name: Weekly Blog Deploy

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate new blog post
        run: python content_planner.py --count 1
      - name: Rebuild static site
        run: python generate.py
      - name: Commit and push
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@research-automation-hub.dev"
          git add content/posts/ topic_pool.json docs/
          git commit -m "auto: weekly blog post" || echo "No changes"
          git push
